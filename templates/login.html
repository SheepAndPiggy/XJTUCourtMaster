<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>移动交大APP登录</title>
    <style>
        /* 你的样式保持不变 */
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            width: 320px;
            background: #fff;
            padding: 30px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }
        .login-container label {
            display: block;
            margin-bottom: 8px;
            color: #555;
        }
        .login-container input[type="text"],
        .login-container input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        .login-container button:hover {
            background: #0056b3;
        }
        .flash {
            margin-bottom: 12px;
            padding: 8px 10px;
            border-radius: 6px;
        }
        .flash-success { background:#d4edda; color:#155724; border:1px solid #c3e6cb; }
        .flash-danger  { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>用户登录</h2>

        <!-- flash 消息 -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash flash-{{ 'success' if category=='success' else 'danger' }}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <label for="username">账户</label>
            <!-- 使用模板变量回显（若无则为空） -->
            <input type="text" id="username" name="username" placeholder="请输入账户" required
                   value="{{ username or '' }}">

            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required
                   value="{{ password or '' }}">

            <button type="submit">登录</button>
        </form>
    </div>
</body>
</html>
